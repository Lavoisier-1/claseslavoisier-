<header class="hero">

<div class="overlay">

<h1>Calculadora Científica</h1>

<p>

Realizá cálculos rápidos directamente desde el navegador.

</p>

</div>

<section class="contenido">

<h1><i class="fas fa-calculator"></i> Calculadora Científica</h1>

<p style="text-align:center;">

Sumá, restá, multiplicá y dividí de forma rápida.

</p>

<div class="calculadora">

<input
type="text"
id="pantalla"
placeholder="0"
readonly>

<div class="teclado">
<button onclick="raiz()">√</button>

<button onclick="cuadrado()">x²</button>

<button onclick="agregar('3.141592653589793')">π</button>
<button onclick="seno()">sin</button>

<button onclick="coseno()">cos</button>

<button onclick="tangente()">tan</button>

<button onclick="logaritmo()">log</button>
<button onclick="agregar('(')">(</button>
<button onclick="agregar('7')">7</button>
<button onclick="agregar('8')">8</button>
<button onclick="agregar('9')">9</button>
<button onclick="agregar('/')">÷</button>

<button onclick="agregar('4')">4</button>
<button onclick="agregar('5')">5</button>
<button onclick="agregar('6')">6</button>
<button onclick="agregar('*')">×</button>

<button onclick="agregar('1')">1</button>
<button onclick="agregar('2')">2</button>
<button onclick="agregar('3')">3</button>
<button onclick="agregar('-')">−</button>

<button onclick="agregar('0')">0</button>

<button onclick="agregar('.')">.</button>

<button onclick="agregar(')')">)</button>

<button onclick="agregar('+')">+</button>
<button onclick="calcular()" class="igual">

=

</button>  

<button onclick="borrarUno()">

⌫

</button>

<button class="borrar" onclick="borrarTodo()">

C

</button>

</div>

</div>
